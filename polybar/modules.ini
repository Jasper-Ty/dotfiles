;; == i3 ==================================================
[module/i3]
type = internal/i3 

pin-workspaces = true
strip-wsnumbers = true
index-sort = true

fuzzy-match = true
ws-icon-0 = 1;¾░ûƒ
ws-icon-1 = 2;¾░¡╣
ws-icon-2 = 3;¯×ò
ws-icon-3 = 4;´Ç¡
ws-icon-4 = 5;¾░Æï
ws-icon-5 = 6;

label-dimmed-underline = ${root.background}

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e60053

label-focused = %icon% %index%
label-focused-padding = 2
label-focused-foreground = ${colors.primary}
label-focused-underline = ${colors.primary}

label-unfocused = %icon% %index% 
label-unfocused-padding = 2

label-visible = %icon% %index% 
label-visible-padding = 2

label-urgent = %icon% %index% 
label-urgent-padding = 2
label-urgent-foreground = ${colors.red}
label-urgent-underline = ${colors.red}
;; ========================================================


;; == memory ==============================================
[module/memory]
type = internal/memory

; seconds to sleep between updates
interval = 0.5

; Threshold for warning
warn-percentage = 95

; The format for the module
format = <label>
; What is typed out in the label
label = "%percentage_used:2:3%% ´ö© "
; Label color
label-foreground = ${colors.blue}

bar-used-width = 8
bar-used-indicator = "¯ëÅ "
bar-used-indicator-foreground = ${colors.blue}
bar-used-empty = "¾░ïÖ " 
bar-used-empty-foreground = ${colors.foreground}
bar-used-fill = "¯ëÅ " 
bar-used-fill-foreground = ${colors.blue}
;; ========================================================


;; == cpu =================================================
[module/cpu]
type = internal/cpu

; Seconds to sleep between updates
interval = 0.5

; Threshold for warning
warn-percentage = 95

; The format for the module
format = <label>
; What is typed out in the label
label = "%percentage:2:3%% ´Æ╝ "
; Label color
