# vim:syntax=i3config:

# picom compositor
exec --no-startup-id picom -b

# Start XDG autostart .desktop files using dex. See also
# https://wiki.archlinux.org/index.php/XDG_Autostart
exec --no-startup-id dex --autostart --environment i3

# background
# chooses a random image in the Wallpapers directory
exec --no-startup-id $DOTFILES/scripts/background.sh

# xss-lock grabs a logind suspend inhibit lock and will use i3lock to lock the
# screen before suspend. Use loginctl lock-session to lock your screen.
exec --no-startup-id xss-lock --transfer-sleep-lock -- $DOTFILES/scripts/lock-blur.sh

# polybar
exec --no-startup-id $DOTFILES/polybar/polybar.sh
